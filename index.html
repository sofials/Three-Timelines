<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#303030" />
  <title>Tre Linee Temporali — Museo Marazzato</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/ui.css" />
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
  </style>
</head>
<body>

<!-- ─── UI overlay ─────────────────────────────────────────────────────── -->

<div id="loading-overlay">
  <div class="loading-inner">
    <div class="loading-logo">M</div>
    <p class="loading-text">Caricamento…</p>
  </div>
</div>

<div id="topbar">
  <span class="topbar-title">Tre Linee Temporali</span>
  <button id="help-btn" aria-label="Aiuto">?</button>
</div>

<div id="dial-wrap">
  <div id="dial" aria-label="Ghiera timeline">
    <div id="dial-knob"></div>
  </div>
  <span id="dial-label">○</span>
</div>

<div id="help-modal" class="hidden" role="dialog" aria-modal="true">
  <div class="modal-inner">
    <button id="help-close" aria-label="Chiudi">✕</button>
    <h2>Come funziona</h2>
    <p>Punta il telefono verso gli oggetti sui plinti.<br>
       Toccalo per rivelare la timeline.</p>
    <p><strong>Passato</strong> vicino all'ingresso · <strong>Futuro</strong> vicino all'uscita.</p>
    <p>Ruota la ghiera o scorri orizzontalmente.<br>
       Sinistra → Passato · Destra → Futuro</p>
  </div>
</div>

<div id="debug-label" style="display:none; position:fixed; top:54px; left:0; right:0;
  background:rgba(199,42,9,0.88); color:#fff; font-family:monospace; font-size:13px;
  text-align:center; padding:5px; z-index:99;"></div>

<!-- ES Module import map — tells browser where to find three -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<!-- MindAR Three.js — must load as regular script before the module -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>

<script type="module" src="js/main.js"></script>
</body>
</html>
